<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>
    <p>All Orders:</p>

    {% for item in orders %}
        <p>Item: {{ item.food }} ({{ item.numFood }}) - {{ item.drink }} ({{ item.numDrink }})</p>
    {% endfor %}
    <ul id="dash-list"></ul>
</body>
</html>
